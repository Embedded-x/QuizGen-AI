services:

  backend:
    build: ./backend
    container_name: quizgen-backend

    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env

    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: quizgen-frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

    restart: unless-stopped